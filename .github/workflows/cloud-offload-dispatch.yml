name: cloud-offload-dispatch

on:
  workflow_dispatch:
    inputs:
      task:
        description: "Cloud offload task to run"
        required: true
        default: "powershell-smoke"
        type: choice
        options:
          - powershell-smoke
          - repo-inventory

jobs:
  offload:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Parse PowerShell files
        shell: pwsh
        run: |
          $targets = Get-ChildItem -Path ./cloud-bootstrap -Recurse -Include *.ps1,*.psm1 | Select-Object -ExpandProperty FullName
          if (-not $targets) {
            throw "No PowerShell bootstrap files found."
          }

          foreach ($target in $targets) {
            $tokens = $null
            $errors = $null
            [System.Management.Automation.Language.Parser]::ParseFile($target, [ref]$tokens, [ref]$errors) | Out-Null
            if ($errors.Count -gt 0) {
              Write-Host "::error file=$target::$($errors[0].Message)"
              throw "PowerShell parse validation failed."
            }
          }

      - name: PowerShell smoke
        if: ${{ inputs.task == 'powershell-smoke' }}
        shell: pwsh
        run: |
          ./cloud-bootstrap/scripts/Invoke-CloudAudit.ps1
          ./cloud-bootstrap/scripts/Invoke-CloudOffloadHub.ps1

      - name: Repo inventory
        if: ${{ inputs.task == 'repo-inventory' }}
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Path ./artifacts -Force | Out-Null
          Get-ChildItem -Path . -File -Recurse -Force |
            Where-Object { $_.FullName -notmatch '\\.git\\' } |
            Sort-Object Length -Descending |
            Select-Object FullName, Length, LastWriteTime |
            Export-Csv -NoTypeInformation -Path ./artifacts/repo-inventory.csv

      - name: Upload inventory artifact
        if: ${{ inputs.task == 'repo-inventory' }}
        uses: actions/upload-artifact@v4
        with:
          name: repo-inventory
          path: ./artifacts/repo-inventory.csv
