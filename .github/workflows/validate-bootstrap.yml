name: validate-bootstrap

on:
  push:
    branches:
      - main
      - master
  pull_request:

jobs:
  powershell-parse:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Parse PowerShell files
        shell: pwsh
        run: |
          $targets = Get-ChildItem -Path ./cloud-bootstrap -Recurse -Include *.ps1,*.psm1 | Select-Object -ExpandProperty FullName
          if (-not $targets) {
            throw "No PowerShell bootstrap files found."
          }

          $failed = $false
          foreach ($target in $targets) {
            $tokens = $null
            $errors = $null
            [System.Management.Automation.Language.Parser]::ParseFile($target, [ref]$tokens, [ref]$errors) | Out-Null
            if ($errors.Count -gt 0) {
              $failed = $true
              Write-Host "::error file=$target::$($errors[0].Message)"
            }
          }

          if ($failed) {
            throw "PowerShell parse validation failed."
          }

      - name: Dry-run smoke tests
        shell: pwsh
        run: |
          ./cloud-bootstrap/scripts/Invoke-CloudAudit.ps1
          ./cloud-bootstrap/scripts/Prepare-ChromeEdge.ps1 -ApplyEdgePolicies
          ./cloud-bootstrap/scripts/Invoke-FastRelief.ps1
